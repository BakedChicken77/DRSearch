version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: drsearch_lg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata_lg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/drsearch_lg
      REDIS_URL: redis://redis:6379
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT}
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  streamlit:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pgdata_lg:
